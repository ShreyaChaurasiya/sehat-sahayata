<!DOCTYPE html>
<html>
<head>
  <title>Book Appointment</title>
</head>
<body>

<h2>Book Appointment</h2>

<form onsubmit="submitForm(); return false;">
  <input type="text" id="name" placeholder="Name" required><br><br>
  <input type="text" id="phone" placeholder="Phone" required><br><br>

  <select id="doctor">
    <option>Dr. Sharma (Cardiologist)</option>
    <option>Dr. Gupta (Neurologist)</option>
    <option>Dr. Mehta (General Physician)</option>
  </select><br><br>

  <input type="date" id="date"><br><br>

  <textarea placeholder="Describe problem"></textarea><br><br>

  <button type="submit">Submit</button>
</form>

<script>
function submitForm() {
  alert("Appointment Booked Successfully!");
}
</script>

</body>
</html>
